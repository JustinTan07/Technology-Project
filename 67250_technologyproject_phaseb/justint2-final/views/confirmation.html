<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- External library: jQuery CDN (used for site interactions in scripts.js) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../static/scripts.js" defer></script>
    <link rel="stylesheet" href="../static/style.css" />
    <meta name="author" content="Justin Tan" />
    <meta
      name="keywords"
      content="Museum, Carnegie Mellon University, Information Systems"
    />
    <meta name="description" content="MonoMuse website redesign project" />
    <title>Order Confirmation</title>
  </head>
  <body
    onload="
      addYear();
      ActiveNav();
      renderConfirmation();
    "
  >
    <div class="container">
      <header class="header">
        <div class="brand">
          <img
            id="logo"
            src="../static/monomuselogo.png"
            alt="MonoMuse Museum Logo"
          />
          <span class="header-wordmark">MonoMuse</span>
        </div>

        <nav class="nav_bar" id="mainNav">
          <a href="../index.html">Home</a>
          <a href="explore.html">Explore</a>
          <a href="exhibitions.html">Exhibitions</a>
          <a href="buytickets.html">Buy Tickets</a>
          <a href="checkout.html">Checkout</a>
          <button
            class="nav_toggle"
            type="button"
            aria-label="Toggle navigation menu"
            onclick="toggleNav('mainNav')"
          >
            &#9776;
          </button>
        </nav>
      </header>

      <main class="main">
        <div class="card">
          <h1>Order Confirmation</h1>
          <p id="confirmMessage">
            Your order has been placed. This is a simulated checkout.
          </p>
          <p id="confirmDetails"></p>
          <p class="checkout-total">
            Final total: <strong id="confirmTotal">$0.00</strong>
          </p>
          <p><a href="checkout.html">Place Another Order</a></p>
        </div>
      </main>

      <figure class="main_figure">
        <img
          src="https://images.unsplash.com/photo-1567970009487-fe7b48f2d8a6?fit=max&w=1080&q=80"
          alt="Visitor receiving museum ticket at front desk"
        />
      </figure>

      <footer class="footer">
        <p>
          Copyright &copy; <span id="copyYear"></span> MonoMuse Museum. All
          rights reserved.
        </p>
        <p>
          Image source:
          <a href="https://unsplash.com">Unsplash</a>
        </p>
        <p class="footer-tagline">Where Art Meets Technology</p>
      </footer>
    </div>
  </body>
</html>
