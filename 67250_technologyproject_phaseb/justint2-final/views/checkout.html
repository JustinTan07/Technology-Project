<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- External library: jQuery CDN (used for site interactions in scripts.js) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../static/scripts.js" defer></script>
    <link rel="stylesheet" href="../static/style.css" />
    <meta name="author" content="Justin Tan" />
    <meta
      name="keywords"
      content="Museum, Carnegie Mellon University, Information Systems"
    />
    <meta name="description" content="MonoMuse website redesign project" />
    <title>Checkout</title>
  </head>
  <body
    onload="
      addYear();
      ActiveNav();
      initCheckoutPage();
    "
  >
    <div class="container">
      <header class="header">
        <div class="brand">
          <img
            id="logo"
            src="../static/monomuselogo.png"
            alt="MonoMuse Museum Logo"
          />
          <span class="header-wordmark">MonoMuse</span>
        </div>

        <nav class="nav_bar" id="mainNav">
          <a href="../index.html">Home</a>
          <a href="explore.html">Explore</a>
          <a href="exhibitions.html">Exhibitions</a>
          <a href="buytickets.html">Buy Tickets</a>
          <a href="checkout.html">Checkout</a>
          <button
            class="nav_toggle"
            type="button"
            aria-label="Toggle navigation menu"
            onclick="toggleNav('mainNav')"
          >
            &#9776;
          </button>
        </nav>
      </header>

      <main class="main">
        <div class="card">
          <h1>Checkout</h1>
          <p>Complete your ticket details below to place a simulated order.</p>

          <form id="checkoutForm" novalidate>
            <label for="visitDate">Visit date (required)</label>
            <input id="visitDate" name="visitDate" type="date" required />
            <p class="error-msg" id="visitDateError" aria-live="polite"></p>

            <label for="ticketType">Ticket type (required)</label>
            <select id="ticketType" name="ticketType" required>
              <option value="">Select ticket type</option>
              <option value="general">General</option>
              <option value="student">Student</option>
              <option value="member">Member</option>
            </select>
            <p class="error-msg" id="ticketTypeError" aria-live="polite"></p>

            <label for="ticketQuantity">Ticket quantity (1-10, required)</label>
            <input
              id="ticketQuantity"
              name="ticketQuantity"
              type="number"
              min="1"
              max="10"
              step="1"
              required
            />
            <p
              class="error-msg"
              id="ticketQuantityError"
              aria-live="polite"
            ></p>

            <label for="email">Email (required)</label>
            <input id="email" name="email" type="email" required />
            <p class="error-msg" id="emailError" aria-live="polite"></p>

            <label for="zipCode"
              >Zip code (optional, 5 digits if entered)</label
            >
            <input
              id="zipCode"
              name="zipCode"
              type="text"
              inputmode="numeric"
            />
            <p class="error-msg" id="zipCodeError" aria-live="polite"></p>

            <label class="checkbox-row" for="mailingList">
              <input id="mailingList" name="mailingList" type="checkbox" />
              Join our mailing list
            </label>

            <p class="checkout-total">
              Total: <strong id="checkoutTotal">$0.00</strong>
            </p>

            <button type="submit">Place Order</button>
          </form>

          <p><a href="buytickets.html">Back to Buy Tickets</a></p>
        </div>
      </main>

      <figure class="main_figure">
        <img src="../static/monomuselogo.png" alt="Checkout MonoMuse" />
      </figure>

      <footer class="footer">
        <p>
          Copyright &copy; <span id="copyYear"></span> MonoMuse Museum. All
          rights reserved.
        </p>
        <p class="footer-tagline">Where Art Meets Technology</p>
      </footer>
    </div>
  </body>
</html>
